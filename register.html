<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Almond</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/src/js/main.js"></script>
    <link rel="stylesheet" href="/src/css/main.css">
</head>
<body class="bg-almond-50 min-h-screen flex flex-col">

    <!-- Top Navigation (Simplified for Auth Pages) -->
    <nav class="bg-surface border-b border-almond-200">
        <div class="max-w-screen-xl mx-auto px-4 py-3">
            <a href="/" class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-sm">A</span>
                </div>
                <span class="self-center text-xl font-semibold whitespace-nowrap text-text-main">Almond</span>
            </a>
        </div>
    </nav>

    <!-- Register Container -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">

            <!-- Register Card -->
            <div class="bg-surface rounded-xl shadow-lg border border-almond-200 overflow-hidden">

                <!-- Header -->
                <div class="px-8 py-6 bg-almond-50 border-b border-almond-200">
                    <h1 class="text-2xl font-bold text-text-main">Create Account</h1>
                    <p class="text-text-muted text-sm mt-1">Get started with your free account</p>
                </div>

                <!-- Form -->
                <form class="px-8 py-6 space-y-5" x-data="registerForm()" @submit.prevent="submitRegister()">

                    <!-- Full Name -->
                    <div>
                        <label class="block text-sm font-medium text-text-main mb-1">Full Name</label>
                        <input type="text" x-model="name" required
                               class="w-full px-4 py-2.5 border border-almond-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                               placeholder="John Doe">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-text-main mb-1">Email Address</label>
                        <input type="email" x-model="email" required
                               class="w-full px-4 py-2.5 border border-almond-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                               placeholder="you@example.com">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-text-main mb-1">Password</label>
                        <input type="password" x-model="password" required
                               class="w-full px-4 py-2.5 border border-almond-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                               placeholder="At least 8 characters">
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-sm font-medium text-text-main mb-1">Confirm Password</label>
                        <input type="password" x-model="confirmPassword" required
                               class="w-full px-4 py-2.5 border border-almond-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                               placeholder="Re-enter your password">
                    </div>

                    <!-- Terms -->
                    <div class="flex items-start">
                        <input type="checkbox" x-model="agreeTerms" required
                               class="w-4 h-4 mt-0.5 text-primary-500 border-almond-200 rounded focus:ring-primary-500">
                        <span class="ml-2 text-sm text-text-muted">
                            I agree to the <a href="#" class="text-primary-500 hover:text-primary-600 font-medium">Terms of Service</a>
                            and <a href="#" class="text-primary-500 hover:text-primary-600 font-medium">Privacy Policy</a>
                        </span>
                    </div>

                    <!-- Error Message (Conditional) -->
                    <div x-show="error" x-transition class="p-3 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-sm text-red-600" x-text="errorMessage"></p>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                            class="w-full py-2.5 px-4 bg-primary-500 hover:bg-primary-600 text-white font-medium rounded-lg transition-colors flex items-center justify-center space-x-2"
                            :disabled="loading">
                        <svg x-show="loading" class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        <span x-text="loading ? 'Creating account...' : 'Create Account'"></span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="px-8 py-4 bg-almond-50 border-t border-almond-200">
                    <p class="text-center text-sm text-text-muted">
                        Already have an account?
                        <a href="login.html" class="text-primary-500 hover:text-primary-600 font-medium">Sign in</a>
                    </p>
                </div>
            </div>

            <!-- Additional Links -->
            <div class="mt-6 text-center">
                <a href="index.html" class="text-sm text-text-muted hover:text-text-main transition-colors">&larr; Back to Dashboard</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface border-t border-almond-200 py-6">
        <div class="max-w-screen-xl mx-auto px-4 text-center">
            <p class="text-sm text-text-muted">&copy; 2024 Almond. All rights reserved.</p>
        </div>
    </footer>

    <!-- Alpine Register Logic -->
    <script>
        function registerForm() {
            return {
                name: '',
                email: '',
                password: '',
                confirmPassword: '',
                agreeTerms: false,
                loading: false,
                error: false,
                errorMessage: '',

                async submitRegister() {
                    this.loading = true;
                    this.error = false;

                    if (this.password.length < 8) {
                        this.error = true;
                        this.errorMessage = 'Password must be at least 8 characters long.';
                        this.loading = false;
                        return;
                    }

                    if (this.password !== this.confirmPassword) {
                        this.error = true;
                        this.errorMessage = 'Passwords do not match.';
                        this.loading = false;
                        return;
                    }

                    // Simulate API call
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    // Demo: redirect to login
                    window.location.href = 'login.html';
                }
            }
        }
    </script>

</body>
</html>
